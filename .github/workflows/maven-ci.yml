name: Maven CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permissao ao Maven Wrapper
        run: chmod +x devops2026-ufoTracker/mvnw

      - name: Build com Maven
        working-directory: devops2026-ufoTracker
        run: ./mvnw package -DskipTests
