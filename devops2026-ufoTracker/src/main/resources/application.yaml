spring:
  cache:
    type: redis
    cache-names:
      - casosUfo
      - avistamentos
    redis:
      time-to-live: 10m
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:ufo-redis}
      port: ${REDIS_PORT:6379}
  application:
    name: ufoTracker
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:ufodb}:${POSTGRES_PORT:5432}/${DB_NAME:ufology}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        hibernate.jdbc.time_zone: America/Sao_Paulo
    hibernate:
      ddl-auto: none


