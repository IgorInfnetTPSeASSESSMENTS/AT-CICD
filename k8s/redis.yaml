apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufo-redis
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ufo-redis
  template:
    metadata:
      labels:
        app: ufo-redis
    spec:
      containers:
        - name: redis
          image: redis:8.6.2-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: ufo-redis
  namespace: ufology
spec:
  type: ClusterIP
  selector:
    app: ufo-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
